<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise POS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    .splash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ef4444 0%, #f97316 50%, #ec4899 100%);
      color: white;
    }
    .logo { font-size: 64px; margin-bottom: 20px; }
    .title { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
    .subtitle { font-size: 16px; opacity: 0.9; }
    .loader {
      width: 50px; height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 30px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">🏪</div>
    <div class="title">Enterprise POS ERP</div>
    <div class="subtitle">Loading application...</div>
    <div class="loader"></div>
  </div>
</body>
</html>
